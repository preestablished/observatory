name: ci
on:
  pull_request:
  push:
jobs:
  rust:
    strategy:
      matrix:
        # M0 acceptance: cargo test green on x86_64 AND aarch64.
        # ubuntu-24.04-arm is free for public repos only; if this leg cannot
        # be provisioned, file a bead and record it as pending CI debt in the
        # handback — do not drop the aarch64 requirement silently.
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      # Path dep ../control-plane/crates/determinism-proto: pinned so
      # upstream changes cannot break this repo asynchronously. Bump
      # deliberately per docs/proto-pin.md.
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          ref: 853a0b200df3b7cd4770393f408997414536bf7f
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
        working-directory: repo
        if: matrix.runner == 'ubuntu-latest'
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: repo
        if: matrix.runner == 'ubuntu-latest'
      - run: cargo build --workspace
        working-directory: repo
      - run: cargo test --workspace
        working-directory: repo

  # MAP.md CI determinism obligation: 100k-envelope double-replay must be
  # byte-identical. The --test form fails loudly if the target disappears
  # (a name filter could match zero tests and pass vacuously).
  determinism-gate:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          ref: 853a0b200df3b7cd4770393f408997414536bf7f
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
      - name: determinism gate (100k double-replay, byte-identical)
        run: cargo test -p obs-ingest --release --test determinism_replay
        working-directory: repo

  # Reduced kill -9 chaos run (100k; the full 1M run is local evidence,
  # see evidence/phase5-m1-m2/m1-killnine.txt).
  chaos-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          ref: 853a0b200df3b7cd4770393f408997414536bf7f
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/chaos-killnine.sh 100000
        working-directory: repo

  # 30 s at 10k events/s asserting only "no error, channel depth bounded"
  # (the 10-min ack-p99 number stays Spark-local evidence).
  throughput-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          ref: 853a0b200df3b7cd4770393f408997414536bf7f
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
      - run: bash scripts/throughput-smoke.sh
        working-directory: repo

  # Reduced M0 write-rate smoke (>=5k inserts/s; the >=50k number is local
  # NVMe evidence, see evidence/phase5-m1-m2/m0-writebatch-bench.txt).
  m0-store-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          ref: 853a0b200df3b7cd4770393f408997414536bf7f
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p obs-store --release --test insert_rate_smoke
        working-directory: repo
